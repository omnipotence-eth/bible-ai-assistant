# Development stack on Windows PC (optional Docker orchestration).
# Run: docker compose up -d kokoro-tts
# Or run Kokoro manually: docker run -d --gpus all -p 8880:8880 ghcr.io/remsky/kokoro-fastapi-gpu

version: "3.8"
services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    ports:
      - "8880:8880"
    # GPU (comment out deploy for CPU-only; or use kokoro-fastapi-cpu image)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
