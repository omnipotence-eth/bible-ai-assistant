# Bible AI Assistant - Training Config
# Qwen3.5-4B: use bf16 LoRA (load_in_4bit: false). Unsloth does NOT recommend 4-bit for Qwen3.5.

model:
  name: "Qwen/Qwen3.5-4B"
  load_in_4bit: false
  max_seq_length: 2048  # 4096 OOMs on 16GB with bf16 LoRA; 2048 fits

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"

training:
  output_dir: "checkpoints"
  eval_split: 0.1  # Fraction of data held out for evaluation during training
  num_train_epochs: 3
  per_device_train_batch_size: 2   # 4 OOMs with 2048 seq; use grad_accum 8 for effective 16
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_steps: 100
  save_steps: 500
  logging_steps: 50
  bf16: true   # REQUIRED for Blackwell (RTX 5070 Ti). Do not use fp16.
  report_to: "wandb"
  random_state: 3407  # Seed for train/eval split and LoRA init

data:
  train_file: "data/processed/train.json"
  eval_file: null  # optional
