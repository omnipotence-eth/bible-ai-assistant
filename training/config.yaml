# Bible AI Assistant - Training Config
# QLoRA fine-tuning for Qwen3-4B-Instruct-2507

model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  load_in_4bit: true
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"

training:
  output_dir: "checkpoints"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_steps: 100
  save_steps: 500
  logging_steps: 50
  bf16: true   # REQUIRED for Blackwell (RTX 5070 Ti). Do not use fp16.
  report_to: "wandb"

data:
  train_file: "data/processed/train.json"
  eval_file: null  # optional
