version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      ml-deps:
        patterns: ["transformers", "trl", "peft", "unsloth*"]
      dev-deps:
        patterns: ["ruff", "pytest*", "pre-commit"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
