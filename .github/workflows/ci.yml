name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install ruff
        run: pip install "ruff>=0.4.0,<1"

      - name: Check formatting
        run: ruff format --check training/ rag/ scripts/ ui/ voice/ tests/ deployment/ --exclude chroma_db,checkpoints,checkpoints-orpo,wandb,unsloth_compiled_cache

      - name: Run linter
        run: ruff check training/ rag/ scripts/ ui/ voice/ tests/ deployment/ --exclude chroma_db,checkpoints,checkpoints-orpo,wandb,unsloth_compiled_cache

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-security-

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,ui]"
          pip install "pip-audit>=2.7.0" "bandit[toml]>=1.7.9"

      - name: Audit dependencies for CVEs
        # pip-audit scans the active environment — no requirement file needed
        # CVE-2026-4539 (pygments 2.19.2): no upstream fix available yet.
        # Revisit when pygments ships a patched release.
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-1839

      - name: Run bandit static analysis
        run: bandit -c pyproject.toml -r rag/ training/ scripts/ ui/ voice/ -ll --quiet

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-test-${{ matrix.python-version }}-

      - name: Install dependencies
        # Install only what the tests need — avoids pulling the full ML training stack
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rag,dev]"

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --tb=short -x --cov=rag --cov=training --cov-report=term-missing --cov-fail-under=50
        env:
          PYTHONPATH: .

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build RAG server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/pc/Dockerfile.rag
          push: false
          tags: bible-ai-rag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Gradio UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/pc/Dockerfile.ui
          push: false
          tags: bible-ai-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
